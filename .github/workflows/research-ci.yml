name: research-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Ruff lint
        run: ruff check risk_rth tests scripts

      - name: Black format check
        run: black --check risk_rth tests scripts

      - name: Tests
        run: pytest -q

      - name: Experiment smoke test
        run: python scripts/run_experiment.py --config configs/experiments/nominal.yaml --output-dir results/ci-smoke

      - name: Demo GIF smoke test
        run: python scripts/make_demo_gif.py
