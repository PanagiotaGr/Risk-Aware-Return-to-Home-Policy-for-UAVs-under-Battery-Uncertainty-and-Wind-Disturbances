name: research-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Lint
        run: ruff check risk_rth tests scripts
      - name: Tests
        run: pytest -q
      - name: Experiment smoke test
        run: python scripts/run_experiment.py --config configs/experiments/nominal.yaml --output-dir results/ci-smoke
